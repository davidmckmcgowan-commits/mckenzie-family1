:root{--green-dark:#0a4a35;--green-mid:#0F6E56;--green-light:#1D9E75;--green-pale:#E1F5EE;--amber:#BA7517;--amber-pale:#FAEEDA;--coral:#993C1D;--coral-pale:#FAECE7;--blue-pale:#E6F1FB;--blue-mid:#185FA5;--pink-pale:#FBEAF0;--pink-mid:#993556;--text:#1a1a18;--text-muted:#5a5a55;--text-faint:#8a8a82;--bg:#fafaf7;--bg2:#f2f2ec;--border:rgba(0,0,0,0.1);--radius:12px;--radius-sm:8px;}

.nav-btn:hover{background:rgba(255,255,255,0.1);opacity:1;}
